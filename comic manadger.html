<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <title>Comic Manadger</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        /* Alap reset */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, Helvetica, sans-serif;
            background-color: #121212;
            color: #ffffff;
        }

        /* ===== HEADER ===== */
        header {
            width: 100%;
            background-color: #1f1f1f;
            padding: 16px 24px;
            display: flex;
            align-items: center;
        }

        header a {
            color: #ffffff;
            text-decoration: none;
            font-size: 18px;
            font-weight: bold;
        }

        header a:hover {
            text-decoration: underline;
        }

        /* ===== GRID KONTAINER ===== */
        .grid-container {
            max-width: 1200px;
            margin: 40px auto;
            padding: 0 20px;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 24px; /* vízszintes + függőleges távolság */
        }

        /* ===== TÉGLATEST / KÁRTYA ===== */
        .card {
            display: block; /* <a> elem miatt */
            width: 100%;
            height: 400px; /* állított téglatest */
            background-color: #2a2a2a;
            border-radius: 12px;
            overflow: hidden;
            text-decoration: none;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }

        .card:hover {
            transform: translateY(-6px);
            box-shadow: 0 12px 30px rgba(0,0,0,0.4);
        }

        .card img {
            width: 100%;
            height: 100%;
            object-fit: cover; /* PNG cserebarát */
            display: block;
        }

        /* ===== MOBIL FINOMÍTÁS ===== */
        @media (max-width: 600px) {
            .card {
                height: 240px;
            }
        }
    </style>
</head>
<body>

    <!-- ===== HEADER ===== -->
    <header>
        <a href="index.html">← Back To Home</a>
    </header>

    <!-- ===== KATTINTHATÓ TÉGLATESTEK ===== -->
