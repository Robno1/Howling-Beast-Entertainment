<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<title>HOWLING BEAST ENTERTAINMENT</title>
<link rel="icon" href="beast.png" type="image/png">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
*{
    box-sizing:border-box;
    margin:0;
    padding:0;
    font-family:Segoe UI,Arial;
}

body{
    background:radial-gradient(circle at top,#2a1838,#0b0812);
    color:#eee;
    overflow-x:hidden;
}

/* ===== GLOBAL FIX STACKING ===== */
header, .nav, .hamburger{
    position:relative;
    z-index:999999;
}

a{
    text-decoration:none;
    color:inherit;
}

/* ================= HEADER ================= */
header{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    background:rgba(10,5,20,.95);
    backdrop-filter:blur(10px);
}

/* ================= NAV ================= */
.nav{
    max-width:1200px;
    margin:auto;
    padding:16px 24px;
    display:flex;
    justify-content:space-between;
    align-items:center;
}

/* LOGO */
.logo img{
    width:80px;
    height:80px;
    object-fit:contain;
}

/* LINKS */
.nav-links{
    display:flex;
    align-items:center;
    gap:20px;
}

.nav-links a{
    font-weight:600;
    opacity:.9;
}

/* BUY BUTTON */
.buy{
    background:#F5B027;
    padding:8px 16px;
    border-radius:20px;
}

/* ================= DROPDOWN ================= */
.dropdown{
    position:relative;
}

.dropbtn{
    cursor:pointer;
    font-weight:600;
}

.dropdown-content{
    display:none;
    position:absolute;
    top:100%;
    left:0;
    background:rgba(10,5,20,.98);
    min-width:200px;
    flex-direction:column;
    border-radius:8px;
    padding:10px 0;
}

.dropdown-content a{
    padding:8px 16px;
    display:flex;
    gap:10px;
    align-items:center;
}

.dropdown-content.show{
    display:flex;
}

/* ================= HAMBURGER ================= */
.hamburger{
    display:none;
    flex-direction:column;
    justify-content:space-between;
    width:30px;
    height:22px;
    cursor:pointer;
    z-index:1000000;
}

.hamburger span{
    height:4px;
    background:#fff;
    border-radius:2px;
}

/* ================= HERO ================= */
.hero{
    min-height:100vh;
    padding-top:90px;
    position:relative;
    overflow:hidden;
}

.hero-video{
    position:absolute;
    inset:0;
    width:100%;
    height:100%;
    object-fit:cover;
    opacity:.35;
    z-index:0;
    pointer-events:none;
}

.hero-content{
    position:relative;
    z-index:2;
    text-align:center;
    padding:120px 24px;
}

.hero h1{
    font-size:92px;
}

/* ================= SECTIONS ================= */
section{
    position:relative;
    z-index:2;
}

/* ================= DISCORD ================= */
.discord{
    position:relative;
    z-index:2;
    text-align:center;
    padding:100px 24px;
    background:radial-gradient(circle,#2b153f,#120815);
}

/* ================= MOBILE ================= */
@media(max-width:900px){

    .hamburger{
        display:flex;
    }

    .nav-links{
        position:fixed;
        top:70px;
        right:0;
        width:260px;
        height:auto;
        background:rgba(10,5,20,.98);
        flex-direction:column;
        align-items:flex-start;
        padding:20px;
        gap:18px;
        display:none;
        z-index:999998;
    }

    .nav-links.show{
        display:flex;
    }

    .hero h1{
        font-size:48px;
    }

    .dropdown-content{
        position:relative;
        background:transparent;
        padding:0;
    }
}
</style>
</head>

<body>

<header>
    <div class="nav">

        <div class="logo">
            <img src="game-logo.png">
        </div>

        <div class="hamburger" onclick="toggleMenu()">
            <span></span>
            <span></span>
            <span></span>
        </div>

        <div class="nav-links">

            <a href="index.html">Home</a>

            <div class="dropdown">
                <div class="dropbtn">Games ▾</div>
                <div class="dropdown-content">
                    <a href="#"><img src="incon.png" width="40">Dual Force</a>
                    <a href="#"><img src="penalty.png" width="40">Penalty</a>
                    <a href="#"><img src="game-logo.png" width="40">FCB</a>
                </div>
            </div>

            <a href="#">Support us</a>
            <a class="buy" href="#">Buy Now</a>

        </div>
    </div>
</header>

<div class="hero">
    <video class="hero-video" autoplay muted loop playsinline>
        <source src="Football Card Battle - Official Trailer (1).mp4">
    </video>

    <div class="hero-content">
        <h1>FOOTBALL CARD BATTLE</h1>
    </div>
</div>

<section>
    <h2>FOOTBALL CARD BATTLE</h2>
    <p>Game description here...</p>
</section>

<div class="discord">
    <h2>Join us</h2>
</div>

<script>
function toggleMenu(){
    document.querySelector('.nav-links').classList.toggle('show');
}

document.querySelectorAll('.dropbtn').forEach(btn=>{
    btn.addEventListener('click', (e)=>{
        e.stopPropagation();
        const menu = btn.nextElementSibling;

        document.querySelectorAll('.dropdown-content').forEach(d=>{
            if(d !== menu) d.classList.remove('show');
        });

        menu.classList.toggle('show');
    });
});

document.addEventListener('click', ()=>{
    document.querySelectorAll('.dropdown-content').forEach(d=>{
        d.classList.remove('show');
    });
});
</script>

</body>
</html>
